<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula Financiera</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🧭 Brújula Financiera</h1>

        <p class="descripcion">
            Descubre cuánto dinero tienes realmente disponible cada mes.
        </p>

        <div class="card">

            <h2>Ingresos</h2>

        <label>Ingresos mensuales totales</label>
        <input
            type="text"
            id="ingresos"
            inputmode="numeric"
            autocomplete="off"
            placeholder="0">

            <h2>Gastos básicos</h2>

<label>Arriendo + gasto común</label>
    <input
        type="text"
        id="arriendo"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">

    <label>Servicios básicos</label>
    <input
        type="text"
        id="servicios"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">

    <label>Alimentación</label>
    <input
        type="text"
        id="alimentacion"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">

    <label>Transporte</label>
    <input
        type="text"
        id="transporte"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">

    <label>Deuda mensual</label>
    <input
        type="text"
        id="deuda"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">

        <h2>Gastos Extra</h2>

    <label>Otros gastos</label>
    <input
        type="text"
        id="otros"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0">



            <button onclick="calcular()">
                Calcular
            </button>

        </div>

        <div class="resultado" id="resultado">

        </div>

    </div>

    <script src="script.js"></script>

<div class="card encuesta">

    <h2>📝 Ayúdanos a mejorar</h2>

    <p class="descripcion">
        Esta versión es un prototipo de Brújula Financiera.
        Tu opinión nos ayudará a construir una mejor herramienta.
    </p>

    <label for="nombre">
        Tu nombre o alias
    </label>

    <input
        type="text"
        id="nombre"
        placeholder="">

    <label for="utilidad">
        ¿Te fue útil esta evaluación?
    </label>

    <select id="utilidad">

        <option value="">Selecciona una opción</option>
        <option>Sí, bastante</option>
        <option>Más o menos</option>
        <option>No</option>

    </select>

    <label for="usaria">
        ¿Utilizarías Brújula Financiera?
    </label>

    <select id="usaria">

        <option value="">Selecciona una opción</option>
        <option>Sí</option>
        <option>Tal vez</option>
        <option>No</option>

    </select>

    <label for="precio">
        ¿Cuánto estarías dispuesto a pagar al mes?
    </label>

    <select id="precio">

        <option value="">Selecciona una opción</option>
        <option>No pagaría</option>
        <option>Hasta $2.000</option>
        <option>Entre $2.000 y $4.000</option>
        <option>Más de $4.000</option>

    </select>

    <label for="funcion">
        ¿Qué función te gustaría más?
    </label>

    <select id="funcion">

        <option value="">Selecciona una opción</option>
        <option>Registro mensual</option>
        <option>Gráficos</option>
        <option>Control de créditos</option>
        <option>Metas de ahorro</option>
        <option>Exportar a Excel</option>

    </select>

    <label for="comentario">
        ¿Qué mejorarías?
    </label>

    <textarea
        id="comentario"
        rows="5"
        placeholder="Escribe aquí cualquier sugerencia..."></textarea>

    <button onclick="enviarEncuesta()">

        Enviar opinión

    </button>

</div>
</body>
</html>
