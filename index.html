<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula Financiera</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🧭 Brújula Financiera</h1>

        <p class="descripcion">
            Descubre cuánto dinero tienes realmente disponible cada mes.
        </p>

        <div class="card">

            <h2>Ingresos</h2>

            <label>Ingresos mensuales totales</label>
            <input type="number" id="ingresos">

            <h2>Gastos básicos</h2>

            <label>Arriendo + gasto común</label>
            <input type="number" id="arriendo">

            <label>Servicios básicos</label>
            <input type="number" id="servicios">

            <label>Alimentación</label>
            <input type="number" id="alimentacion">

            <label>Transporte</label>
            <input type="number" id="transporte">

            <h2>Creditos y Deudas</h2>

            <label>Deuda mensual</label>
            <input type="number" id="deuda">

            <h2>Gastos Extra</h2>

            <label>Otros gastos</label>
            <input type="number" id="otros">

            <button onclick="calcular()">
                Calcular
            </button>

        </div>

        <div class="resultado" id="resultado">

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
